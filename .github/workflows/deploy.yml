name: Deploy to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
  contents: read
    pages: write
    id-token: write

# Prevent overlapping page deployments for the same branch
concurrency:
    group: pages-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Build site
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            # Build from source to avoid cross-workflow artifact coupling
            - name: Typecheck
              run: npm run typecheck

            - name: Build TypeScript
              run: npm run build:ts

            - name: Build Tailwind CSS
              run: npm run build:css

            # Optionally build production bundle if your Pages uses app.bundle.js
            - name: Build production bundle
              run: npm run build:bundle

            # Generate API documentation (included in the Pages artifact alongside the site)
            - name: Generate API docs
              run: npm run docs:generate

            # Compress the bundle for bandwidth savings
            - name: Compress bundle
              run: |
                  gzip -9 -k js/app.bundle.js
                  brotli -9 -k js/app.bundle.js || echo "⚠️  brotli not available, skipping .br compression"
                  echo "📦 Bundle sizes:"
                  du -sh js/app.bundle.js js/app.bundle.js.gz js/app.bundle.js.br 2>/dev/null || du -sh js/app.bundle.js js/app.bundle.js.gz

            - name: Prepare Pages artifact
              run: |
                  rm -rf .pages-dist
                  mkdir -p .pages-dist
                  cp -a index.html projekte.html .pages-dist/
                  cp -a img .pages-dist/
                  cp -a dist .pages-dist/
                  mkdir -p .pages-dist/src
                  cp -a src/css .pages-dist/src/
                  mkdir -p .pages-dist/js
                  cp -a js/app.bundle.js .pages-dist/js/
                  if [ -f js/app.bundle.js.gz ]; then
                    cp -a js/app.bundle.js.gz .pages-dist/js/
                  fi
                  if [ -f js/app.bundle.js.br ]; then
                    cp -a js/app.bundle.js.br .pages-dist/js/
                  fi
                  if [ -d docs/api ]; then
                    mkdir -p .pages-dist/docs
                    cp -a docs/api .pages-dist/docs/
                  fi
                  if [ -f CNAME ]; then
                    cp -a CNAME .pages-dist/
                  fi
                  touch .pages-dist/.nojekyll

            - name: Validate Pages artifact structure
              run: |
                  test -f .pages-dist/index.html
                  test -f .pages-dist/dist/output.css
                  test -f .pages-dist/src/css/style.css
                  test -f .pages-dist/js/app.bundle.js

            # Upload all files needed for Pages to serve
            # We upload everything, but with explicit exclusions for unnecessary files
            # (Ignore-patterns in .gitignore are respected, but we list files explicitly)
            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v4
              with:
                  path: .pages-dist
                  retention-days: 1

    deploy:
        name: Deploy
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
