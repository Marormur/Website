name: Continuous Integration

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]
    schedule:
        # Nightly full-regression run
        - cron: '0 2 * * *'
    workflow_dispatch:
        inputs:
            fullRegression:
                description: 'Run full E2E regression suite (all browsers configured by jobs)'
                required: false
                default: 'false'

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
  contents: read

jobs:
    quality:
        name: Code Quality
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Typecheck
              run: npm run typecheck

            - name: Type Coverage Check
              run: npm run type:baseline
              continue-on-error: false

            - name: Build TypeScript
              run: npm run build:ts

            - name: Lint Code
              run: npm run lint

            - name: Format Check
              run: npm run format:check

            - name: Build CSS
              run: npm run build:css

            - name: Upload build artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: build-${{ github.sha }}
                  path: |
                      dist/
                      js/
                  retention-days: 1

    test-unit:
        name: Unit Tests
        runs-on: ubuntu-latest
        needs: quality
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run Coverage Check
              run: npm run test:coverage -- --reporter=default --reporter=junit --outputFile=test-report.junit.xml
              continue-on-error: false

            - name: Upload test results to Codecov
              if: ${{ !cancelled() }}
              uses: codecov/codecov-action@v5
              with:
                  use_oidc: true
                  files: ./test-report.junit.xml
                  flags: unittests
                  report_type: test_results
                  fail_ci_if_error: false

            - name: Upload coverage to Codecov
              if: always()
              uses: codecov/codecov-action@v5
              with:
                  use_oidc: true
                  files: ./coverage/lcov.info
                  flags: unittests
                  fail_ci_if_error: false

            - name: Upload coverage report
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: coverage-report-${{ github.sha }}
                  path: coverage/
                  retention-days: 7

    test-smoke-chromium:
        name: E2E Smoke (Chromium)
        runs-on: ubuntu-latest
        needs: [quality, test-unit]
        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Cache Playwright browsers
              uses: actions/cache@v5
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

            - name: Install Playwright
              run: npx playwright install --with-deps chromium

            - name: Run E2E Smoke Tests
              env:
                  MOCK_GITHUB: '1'
              run: npm run test:e2e:smoke

            - name: Upload test results
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: test-results-chromium
                  path: test-results/
                  retention-days: 7

    test-full-chromium:
        name: E2E Full Regression (Chromium)
        runs-on: ubuntu-latest
        needs: [quality, test-unit, test-smoke-chromium]
        if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.fullRegression == 'true') || (github.event_name == 'push' && contains(github.event.head_commit.message, '[test-all]')) || (github.event_name == 'pull_request' && contains(github.event.pull_request.title, '[test-all]'))
        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Cache Playwright browsers
              uses: actions/cache@v5
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

            - name: Install Playwright
              run: npx playwright install --with-deps chromium

            - name: Run Full E2E Regression (Chromium)
              env:
                  MOCK_GITHUB: '1'
              run: npx playwright test --project=chromium

            - name: Upload test results
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: test-results-full-chromium
                  path: test-results/
                  retention-days: 7

    test-full-browsers:
        name: E2E Full Regression (${{ matrix.browser }})
        runs-on: ubuntu-latest
        needs: [quality, test-unit, test-smoke-chromium]
        if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.fullRegression == 'true') || (github.event_name == 'push' && contains(github.event.head_commit.message, '[test-all]')) || (github.event_name == 'pull_request' && contains(github.event.pull_request.title, '[test-all]'))
        strategy:
            matrix:
                browser: [firefox, webkit]
        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Cache Playwright browsers
              uses: actions/cache@v5
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

            - name: Install Playwright
              run: npx playwright install --with-deps ${{ matrix.browser }}

            - name: Run Full E2E Regression
              env:
                  MOCK_GITHUB: '1'
              run: npx playwright test --project=${{ matrix.browser }}

            - name: Upload test results
              if: failure()
              uses: actions/upload-artifact@v7
              with:
                  name: test-results-${{ matrix.browser }}
                  path: test-results/
                  retention-days: 7

    security:
        name: Security Audit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20'

            - name: Audit dependencies
              run: npm audit --audit-level=moderate
              continue-on-error: true
