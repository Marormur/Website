# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# ESLint is a tool for identifying and reporting on patterns
# found in ECMAScript/JavaScript code.
# More details at https://github.com/eslint/eslint
# and https://eslint.org

name: ESLint

on:
    push:
        branches: [develop, main]
    pull_request:
        branches: [develop, main]
    schedule:
        - cron: '37 3 * * 4'
    workflow_dispatch:

concurrency:
    group: eslint-${{ github.ref }}
    cancel-in-progress: true

jobs:
    eslint:
        name: Run eslint scanning
        runs-on: ubuntu-latest
        permissions:
            contents: read
            security-events: write
            actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: '20'
                  cache: 'npm'

            # Keep npm aligned with packageManager in package.json to avoid
            # lockfile compatibility mismatches on GitHub runners.
            - name: Setup npm
              run: npm install -g npm@11.6.2

            - name: Verify npm version
              run: npm --version

            - name: Install dependencies
              run: npm ci --prefer-offline --no-audit --no-fund

            - name: Install ESLint SARIF formatter
              run: npm install --no-save @microsoft/eslint-formatter-sarif

            - name: Run ESLint
              env:
                  SARIF_ESLINT_IGNORE_SUPPRESSED: 'true'
              run: |
                  npx eslint src/ts/**/*.ts \
                    --quiet \
                    --config eslint.config.mjs \
                    --format @microsoft/eslint-formatter-sarif \
                    --output-file eslint-results.sarif
              continue-on-error: true

            - name: Upload analysis results to GitHub
              uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
              with:
                  sarif_file: eslint-results.sarif
                  wait-for-processing: true
