codecov:
    require_ci_to_pass: true

coverage:
    precision: 2
    round: down
    range: '70...100'

comment:
    layout: 'reach,diff,flags,files'
    behavior: default
    require_changes: false

flags:
    unittests:
        paths:
            - src/ts/
        carryforward: false

ignore:
    - 'js/**'
    - 'dist/**'
    - 'tests/**'
    - 'docs/**'
    # Exclude modules without unit tests from coverage calculation
    # (only measure core modules: vdom, services, and their dependencies)
    - 'src/ts/apps/**'
    - 'src/ts/ui/**'
    - 'src/ts/utils/**'
    - 'src/ts/framework/**'
    - 'src/ts/windows/**'
    - 'src/ts/compat/**'
